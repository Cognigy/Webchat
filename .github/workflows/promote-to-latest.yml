name: Promote Release to Latest

on:
    workflow_dispatch:
        inputs:
            release_tag:
                description: "Release tag to promote (e.g., v3.38.0). Run workflow to see available releases."
                required: true
                type: string

permissions:
    contents: write

jobs:
    promote-to-latest:
        runs-on: ubuntu-latest
        steps:
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24.x
                  registry-url: https://registry.npmjs.org/

            - name: Extract version from tag
              id: extract-version
              run: |
                  TAG_NAME="${{ github.event.inputs.release_tag }}"

                  # Validate tag format: must be vX.Y.Z or X.Y.Z (semver) with optional prerelease suffix
                  if ! [[ "$TAG_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
                    echo "::error::Invalid release_tag '$TAG_NAME'. Expected semver format like 'v3.38.0'."
                    exit 1
                  fi

                  VERSION="${TAG_NAME#v}"

                  {
                    echo "version<<EOF"
                    echo "$VERSION"
                    echo "EOF"
                    echo "tag<<EOF"
                    echo "$TAG_NAME"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

                  echo "Promoting version: $VERSION (tag: $TAG_NAME)"

            - name: List available releases
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  echo "📋 Available published releases (most recent first):"
                  echo ""
                  gh release list -R "${{ github.repository }}" --exclude-drafts --exclude-pre-releases --limit 20
                  echo ""

            - name: Verify release exists on GitHub
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  echo "🔍 Checking if release ${{ steps.extract-version.outputs.tag }} exists..."
                  RELEASE_JSON=$(gh release view "${{ steps.extract-version.outputs.tag }}" -R "${{ github.repository }}" --json tagName,isLatest,isDraft 2>/dev/null)
                  if [ $? -ne 0 ] || [ -z "$RELEASE_JSON" ]; then
                    echo ""
                    echo "::error::Release '${{ steps.extract-version.outputs.tag }}' not found!"
                    echo "Please check the available releases listed above and ensure you entered the correct tag."
                    exit 1
                  fi

                  echo "$RELEASE_JSON"

                  # Check if it's a draft
                  IS_DRAFT=$(echo "$RELEASE_JSON" | jq -r '.isDraft')

                  if [ "$IS_DRAFT" = "true" ]; then
                    echo "::error::Cannot promote a draft release. Please publish the release first."
                    exit 1
                  fi

                  echo "✅ Release found and is published!"

            - name: Verify package version exists on npm
              run: |
                  echo "🔍 Checking if @cognigy/webchat@${{ steps.extract-version.outputs.version }} exists on npm..."
                  if ! npm view @cognigy/webchat@${{ steps.extract-version.outputs.version }} version 2>/dev/null; then
                    echo ""
                    echo "::error::Package version '${{ steps.extract-version.outputs.version }}' not found on npm!"
                    echo "Make sure the package was published before trying to promote it."
                    exit 1
                  fi
                  echo "✅ Package version found on npm!"

            - name: Show current state
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  echo "📊 Current state before promotion:"
                  echo ""
                  echo "GitHub latest release:"
                  gh release list -R "${{ github.repository }}" --exclude-drafts --limit 5
                  echo ""
                  echo "npm dist-tags:"
                  npm view @cognigy/webchat dist-tags
                  echo ""

            - name: Mark GitHub release as latest
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  echo "🚀 Marking ${{ steps.extract-version.outputs.tag }} as latest release on GitHub..."
                  gh release edit "${{ steps.extract-version.outputs.tag }}" -R "${{ github.repository }}" --latest
                  echo "✅ GitHub release marked as latest!"

            # NPM_TOKEN is a granular access token that expires every 90 days.
            # Rotate it at https://www.npmjs.com/settings/tokens and update the
            # repository secret at https://github.com/Cognigy/Webchat/settings/secrets/actions
            - name: Mark npm package as latest
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  echo "🚀 Marking @cognigy/webchat@${{ steps.extract-version.outputs.version }} as latest on npm..."
                  npm dist-tag add @cognigy/webchat@${{ steps.extract-version.outputs.version }} latest
                  echo "✅ npm package marked as latest!"

            - name: Verify promotion succeeded
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  echo ""
                  echo "════════════════════════════════════════════════════════════"
                  echo "✅ PROMOTION COMPLETE"
                  echo "════════════════════════════════════════════════════════════"
                  echo ""
                  echo "📦 Version: ${{ steps.extract-version.outputs.version }}"
                  echo "🏷️  Tag: ${{ steps.extract-version.outputs.tag }}"
                  echo ""
                  echo "GitHub Release Status:"
                  gh release view "${{ steps.extract-version.outputs.tag }}" -R "${{ github.repository }}" --json tagName,isLatest,publishedAt
                  echo ""
                  echo "npm Package Tags:"
                  npm view @cognigy/webchat dist-tags
                  echo ""
                  echo "════════════════════════════════════════════════════════════"
